package com.edusphere.api_gateway.controller;

import org.springframework.http.HttpStatus;
import org.springframework.http.ResponseEntity;
import org.springframework.web.bind.annotation.RequestMapping;
import org.springframework.web.bind.annotation.RestController;

import java.time.Instant;
import java.util.Map;

/**
 * Handles circuit breaker fallback responses for all downstream services.
 * Each route in application.yaml points its fallbackUri here.
 */
@RestController
public class FallbackController {

    @RequestMapping("/fallback/iam-service")
    public ResponseEntity<Map<String, Object>> iamServiceFallback() {
        return buildFallback("IAM / Auth service is temporarily unavailable. Please try again later.");
    }

    @RequestMapping("/fallback/student-service")
    public ResponseEntity<Map<String, Object>> studentServiceFallback() {
        return buildFallback("Student service is temporarily unavailable. Please try again later.");
    }

    @RequestMapping("/fallback/faculty-service")
    public ResponseEntity<Map<String, Object>> facultyServiceFallback() {
        return buildFallback("Faculty service is temporarily unavailable. Please try again later.");
    }

    @RequestMapping("/fallback/curriculum-service")
    public ResponseEntity<Map<String, Object>> curriculumServiceFallback() {
        return buildFallback("Curriculum service is temporarily unavailable. Please try again later.");
    }

    @RequestMapping("/fallback/compliance-service")
    public ResponseEntity<Map<String, Object>> complianceServiceFallback() {
        return buildFallback("Compliance service is temporarily unavailable. Please try again later.");
    }

    @RequestMapping("/fallback/notification-service")
    public ResponseEntity<Map<String, Object>> notificationServiceFallback() {
        return buildFallback("Notification service is temporarily unavailable. Please try again later.");
    }

    private ResponseEntity<Map<String, Object>> buildFallback(String message) {
        return ResponseEntity.status(HttpStatus.SERVICE_UNAVAILABLE).body(Map.of(
                "status", HttpStatus.SERVICE_UNAVAILABLE.value(),
                "error", HttpStatus.SERVICE_UNAVAILABLE.getReasonPhrase(),
                "message", message,
                "time", Instant.now().toString()
        ));
    }
}
